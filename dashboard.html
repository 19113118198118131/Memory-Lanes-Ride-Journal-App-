<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script>
    (function () {
      try {
        var t = localStorage.getItem('ml-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Ride Journal Dashboard</title>
  <link rel="stylesheet" href="style.css?v=91" />
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="assets/logo/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="assets/logo/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="premium-home-page ios-app-page ios-ride-page">
  <div class="theme-toggle-corner"><button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch theme" title="Toggle light / dark">
      <svg class="ml-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="ml-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
    </button></div>

  <!-- ========== HEADER ========= -->
  <header class="main-header vibe-header">
    <a class="brand-row" href="index.html" aria-label="Memory Lanes home">
      <span class="logo-card">
        <img src="assets/logo/Memory%20Lanes%20Logo.png" alt="" class="brand-logo" />
      </span>
      <span class="brand-titlebox">
        <span class="site-title">Memory Lanes</span>
        <span class="tagline">journal your ride</span>
      </span>
    </a>
    <nav class="site-nav vibe-nav" aria-label="Main navigation">
      <a class="nav-link" href="dashboard.html" data-nav="dashboard.html" aria-current="page">Logs</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="journal.html" data-nav="journal.html">Moments</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="stats.html" data-nav="stats.html">Journeys</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="planner.html" data-nav="planner.html">Plan</a>
    </nav>
  </header>

  <!-- ========== MAIN RIDE LIST ========= -->
  <main class="premium-home-shell">
    <section class="premium-app-topbar" aria-label="Memory Lanes dashboard">
      <div>
        <p class="premium-kicker">Ride journal</p>
        <h1>Memory Lanes</h1>
      </div>
      <div class="premium-top-actions">
        <a class="premium-avatar-action" href="account.html" aria-label="Open account">
          <span data-icon="user"></span>
        </a>
      </div>
    </section>

    <section class="premium-metric-row" aria-label="Ride summary">
      <article class="premium-metric-card">
        <span class="premium-metric-label">This Week</span>
        <strong id="premium-week-distance">-- km</strong>
        <span id="premium-week-rides">-- rides</span>
      </article>
      <article class="premium-metric-card">
        <span class="premium-metric-label">Best Flow</span>
        <strong id="premium-best-flow">--</strong>
        <span>Coach score</span>
      </article>
    </section>

    <section class="premium-primary-actions" aria-label="Primary actions">
      <button id="record-ride-btn" class="premium-primary-button" type="button">
        <span data-icon="play"></span>
        <span>Start Ride</span>
      </button>
      <button id="home-btn" class="premium-secondary-button" type="button">
        <span data-icon="download"></span>
        <span>Import GPX</span>
      </button>
    </section>

    <div class="premium-section-head premium-recent-head">
      <span>Recent Rides</span>
      <button id="stats-btn" class="premium-link-button" type="button">View Stats</button>
    </div>
    <div id="ride-list">Loading…</div>

    <nav class="premium-tabbar app-tabbar" aria-label="App sections">
      <a class="active" href="dashboard.html" aria-current="page"><span data-icon="play"></span><span>Ride</span></a>
      <a href="planner.html"><span data-icon="route"></span><span>Routes</span></a>
      <a href="journal.html"><span data-icon="book"></span><span>Journal</span></a>
      <a href="stats.html"><span data-icon="stats"></span><span>Stats</span></a>
    </nav>
  </main>

  <!-- ========== JS for dashboard ========= -->
  <script type="module" src="dashboard.js?v=90"></script>
  <script type="module" src="icons.js?v=91"></script>
  <script src="theme.js?v=90"></script>
</body>
</html>
