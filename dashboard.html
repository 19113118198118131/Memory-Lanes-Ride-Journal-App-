<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script>
    (function () {
      try {
        var t = localStorage.getItem('ml-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Ride Journal Dashboard</title>
  <link rel="stylesheet" href="style.css?v=77" />
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a192f">
  <link rel="icon" href="assets/logo/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="assets/logo/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="theme-toggle-corner"><button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch theme" title="Toggle light / dark">
      <svg class="ml-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="ml-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
    </button></div>

  <!-- ========== HEADER ========= -->
  <header class="main-header vibe-header">
    <a class="brand-row" href="index.html" aria-label="Memory Lanes home">
      <span class="logo-card">
        <img src="assets/logo/Memory%20Lanes%20Logo.png" alt="" class="brand-logo" />
      </span>
      <span class="brand-titlebox">
        <span class="site-title">Memory Lanes</span>
        <span class="tagline">journal your ride</span>
      </span>
    </a>
    <nav class="site-nav vibe-nav" aria-label="Main navigation">
      <a class="nav-link" href="dashboard.html" data-nav="dashboard.html" aria-current="page">Logs</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="journal.html" data-nav="journal.html">Moments</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="stats.html" data-nav="stats.html">Journeys</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="planner.html" data-nav="planner.html">Plan</a>
    </nav>
  </header>

  <header>
    <div class="dashboard-header">
      <h1>My Ride Journal</h1>
      <div class="button-group">
        <button id="home-btn" class="btn-primary">New Ride</button>
        <button id="record-ride-btn" class="btn-outline">Record a Ride</button>
        <button id="stats-btn" class="btn-outline">Stats</button>
        <button id="export-data-btn" class="btn-outline">Export</button>
        <button id="journal-btn" class="btn-outline">Rider’s Journal</button>
        <button id="logout-btn" class="btn-plain-danger">Logout</button></div>
    </div>
  </header>

  <!-- ========== MAIN RIDE LIST ========= -->
  <main>
    <!-- Rider profile: the name shown on shared-route invite pages -->
    <section id="profile-section" class="profile-card">
      <div class="profile-head">
        <h2>Rider Profile</h2>
        <button type="button" id="profile-toggle-btn" class="btn-outline">Edit</button>
      </div>
      <p id="profile-summary" class="section-sub">Loading profile…</p>
      <div id="profile-form" style="display:none;">
        <p class="section-sub">Shown when you share a route: "Shared by <em>your name</em>". Leave blank to stay anonymous on invites.</p>
        <div class="profile-fields">
          <label>Display name
            <input type="text" id="profile-name-input" maxlength="40" placeholder="e.g. Samar" />
          </label>
          <label>Region
            <input type="text" id="profile-region-input" maxlength="60" placeholder="e.g. Auckland, NZ" />
          </label>
        </div>
        <div class="planner-toolbar-actions">
          <button type="button" id="profile-save-btn" class="btn-primary">Save Profile</button>
        </div>
        <p id="profile-status" class="chart-desc"></p>
      </div>
    </section>

    <!-- Group rides you host or joined: lose the link, recover it here -->
    <section id="group-rides-section" class="profile-card" style="display:none;">
      <h2>Your Group Rides</h2>
      <div id="group-rides-list"></div>
    </section>

    <h2>Your Rides &amp; Planned Routes</h2>
    <div id="ride-list">Loading…</div>
  </main>

  <!-- ========== JS for dashboard ========= -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script type="module" src="dashboard.js?v=77"></script>
  <script type="module" src="icons.js?v=77"></script>
  <script src="theme.js?v=77"></script>
</body>
</html>
