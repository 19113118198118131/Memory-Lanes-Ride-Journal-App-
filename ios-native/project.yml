# XcodeGen spec — generates MemoryLanes.xcodeproj from source.
#
# On a Mac:
#   brew install xcodegen
#   cd ios-native && xcodegen generate && open MemoryLanes.xcodeproj
#
# Hand-writing a .xcodeproj is error-prone; this YAML is the source of truth for
# the project so the repo stays diff-friendly and reproducible.

name: MemoryLanes
options:
  bundleIdPrefix: app.memorylanes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  MemoryLanes:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MemoryLanes
    settings:
      base:
        PRODUCT_NAME: MemoryLanes
        INFOPLIST_FILE: MemoryLanes/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.memorylanes.native
        DEVELOPMENT_TEAM: 57HZXXHCLS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        SUPPORTS_MACCATALYST: NO
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: MemoryLanes/Resources/MemoryLanes.entitlements

  MemoryLanesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MemoryLanesTests
    dependencies:
      - target: MemoryLanes
    settings:
      base:
        PRODUCT_NAME: MemoryLanesTests
        PRODUCT_BUNDLE_IDENTIFIER: app.memorylanes.native.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  MemoryLanes:
    build:
      targets:
        MemoryLanes: all
        MemoryLanesTests: [test]
    test:
      targets:
        - MemoryLanesTests
