<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script>
    (function () {
      try {
        var t = localStorage.getItem('ml-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <title>Rider's Journal | Memory Lanes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css?v=91" />

  <!-- StPageFlip Flipbook Library (MIT License) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/stpageflip@2.0.8/dist/css/page-flip.min.css"/>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a192f">
  <link rel="icon" href="assets/logo/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="assets/logo/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="ios-app-page ios-journal-page">
  <div class="theme-toggle-corner"><button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch theme" title="Toggle light / dark">
      <svg class="ml-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="ml-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
    </button></div>

  <header class="main-header vibe-header">
    <a class="brand-row" href="index.html" aria-label="Memory Lanes home">
      <span class="logo-card">
        <img src="assets/logo/Memory%20Lanes%20Logo.png" alt="" class="brand-logo" />
      </span>
      <span class="brand-titlebox">
        <h1 class="site-title">Rider's Journal</h1>
        <span class="tagline">Your moments, all in one place</span>
      </span>
    </a>
    <nav class="site-nav vibe-nav" aria-label="Main navigation">
      <a class="nav-link" href="dashboard.html" data-nav="dashboard.html">Logs</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="journal.html" data-nav="journal.html" aria-current="page">Moments</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="stats.html" data-nav="stats.html">Journeys</a>
      <span class="nav-sep">|</span>
      <a class="nav-link" href="planner.html" data-nav="planner.html">Plan</a>
    </nav>
    <a class="web-account-action" href="account.html" aria-label="Open account"><span data-icon="user"></span></a>
  </header>
  <main>
    <section aria-labelledby="journal-heading">
      <h2 id="journal-heading">Your Memories & Highlights</h2>
      <div id="road-timeline-container" style="margin-bottom: 1.2rem;"></div>
      <div id="month-filter-container" style="margin-bottom: 1.1rem;"></div>
      <div id="ride-filter-container" style="margin-bottom: 1.1rem;"></div>
      <div id="journal-toggle-view" style="margin-bottom: 1.5rem;">
        <button id="timeline-view-btn" class="active" aria-pressed="true" data-icon="clock">Timeline</button>
        <button id="gallery-view-btn" aria-pressed="false" data-icon="gallery">Gallery</button>
        <button id="flipbook-view-btn" aria-pressed="false" data-icon="book">Flipbook</button>
        <span id="flip-style-toggle" style="margin-left:2em; display:none;">
          <label for="flip-style-select" style="margin-right:0.4em;">Animation:</label>
          <select id="flip-style-select">
            <option value="slide">Slide</option>
            <option value="flip">3D Flip</option>
          </select>
        </span>
      </div>
      <!-- Flipbook Container (only visible in flipbook mode) -->
      <div id="st-pageflip" style="width: 520px; height: 340px; margin: 2.5em auto 2em auto; display: none;"></div>
      <!-- Moment List/Grid View (default) -->
      <div id="journal-moments-list" class="journal-moments-list" aria-live="polite">Loading...</div>
    </section>
    <nav class="ios-tabbar app-tabbar" aria-label="App sections">
      <a href="dashboard.html"><span data-icon="play"></span><span>Ride</span></a>
      <a href="planner.html"><span data-icon="route"></span><span>Routes</span></a>
      <a class="active" href="journal.html" aria-current="page"><span data-icon="book"></span><span>Journal</span></a>
      <a href="stats.html"><span data-icon="stats"></span><span>Stats</span></a>
    </nav>
  </main>
<footer>
  <!-- Optional: Add copyright, branding, support etc. -->
  <span>&copy; Memory Lanes</span>
</footer>
  
  <!-- Always load the flipbook script first -->
  <script src="https://cdn.jsdelivr.net/npm/stpageflip@2.0.8/dist/js/page-flip.browser.min.js"></script>
  <!-- Then load your app's main code as a module -->
  <script type="module" src="journal.js?v=90"></script>
  <script type="module" src="icons.js?v=91"></script>
  <script src="theme.js?v=90"></script>
</body>
</html>
